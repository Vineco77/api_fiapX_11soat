name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Evita runs simultâneos na mesma branch (ex: dois pushes rápidos na main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Permissões mínimas necessárias para semantic-release criar releases e tags
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2 — Build
  # ─────────────────────────────────────────
  build:
    name: Build TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Compile TypeScript
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3 — Testes
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 4 — Semantic Release
  # Roda apenas em push na main, após lint + build + test passarem
  # Analisa commits, bumpa versão, cria GitHub Release e tag
  # ─────────────────────────────────────────
  release:
    name: Semantic Release
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout (histórico completo para o semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Nova versão gerada
        if: steps.semantic.outputs.new_release_published == 'true'
        run: echo "🚀 Nova versão publicada -> v${{ steps.semantic.outputs.new_release_version }}"

  # ─────────────────────────────────────────
  # JOB 5 — Docker Build & Push
  # Roda apenas se o semantic-release gerou uma nova versão
  # Publica vineco/api-fiapx-11soat:vX.Y.Z e :latest
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout da tag gerada pelo semantic-release
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            vineco/api-fiapx-11soat:latest
            vineco/api-fiapx-11soat:v${{ needs.release.outputs.new_release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo do deploy
        run: |
          echo "## ✅ Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Imagem |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| versão | \`vineco/api-fiapx-11soat:v${{ needs.release.outputs.new_release_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| latest | \`vineco/api-fiapx-11soat:latest\` |" >> $GITHUB_STEP_SUMMARY
